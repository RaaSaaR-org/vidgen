<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: {{width}}px;
    height: {{height}}px;
    background: {{effective_background}};
    color: {{theme_text}};
    font-family: '{{theme_font_body}}', system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .scene-container {
    container-type: size;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8%;
  }
  .card {
    text-align: center;
    max-width: 800px;
    animation: fadeIn 0.8s ease-out both;
  }
  .icon {
    font-size: 5vw;
    margin-bottom: 1.5em;
    display: block;
  }
  .feature {
    font-family: '{{theme_font_heading}}', system-ui, sans-serif;
    font-size: 3.5vw;
    font-weight: 800;
    color: {{theme_primary}};
    margin-bottom: 0.5em;
  }
  .description {
    font-size: 1.8vw;
    line-height: 1.6;
    opacity: 0.85;
  }
  .accent-line {
    width: 60px;
    height: 4px;
    background: {{theme_secondary}};
    margin: 1em auto;
    border-radius: 2px;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @container (aspect-ratio < 1) {
    .feature { font-size: 6vw; }
    .description { font-size: 3.5vw; }
    .icon { font-size: 10vw; }
  }
</style>
</head>
<body>
<div class="scene-container">
  <div class="card">
    <span class="icon">{{icon}}</span>
    <div class="feature">{{feature}}</div>
    <div class="accent-line"></div>
    <div class="description">{{description}}</div>
  </div>
</div>
</body>
</html>
